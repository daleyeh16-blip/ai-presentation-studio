<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>AI簡報工作室</title>
  <style>
    :root{
      --bg:#f4f6f8; --panel:#ffffff; --text:#1f2937; --muted:#6b7280;
      --line:#d9dee6; --accent:#2f6f8f; --accent2:#dceef5; --danger:#b42318;
      --slide-bg:#ffffff; --slide-title:#17324d; --slide-text:#334155;
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;background:var(--bg);color:var(--text)}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .app{display:grid;grid-template-columns:280px minmax(0,1fr) 310px;min-height:100vh}
    .sidebar,.inspector{background:var(--panel);border-right:1px solid var(--line);padding:16px;overflow:auto}
    .inspector{border-right:0;border-left:1px solid var(--line)}
    .brand{font-size:20px;font-weight:700;margin-bottom:4px}
    .sub{font-size:13px;color:var(--muted);margin-bottom:16px}
    .section{margin:18px 0}
    .section h3{font-size:14px;margin:0 0 10px}
    .btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 12px;color:var(--text)}
    .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    #deleteSlideBtn{color:var(--danger)}
    .btn.ghost{background:transparent}
    .btn.full{width:100%}
    .row{display:flex;gap:8px;align-items:center}
    .row>*{min-width:0}
    .field{margin-bottom:10px}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
    .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px;background:#fff;color:var(--text)}
    .field textarea{min-height:76px;resize:vertical}
    .slides-list{display:grid;gap:10px}
    .thumb{border:2px solid transparent;border-radius:12px;padding:7px;background:#f8fafc;position:relative}
    .thumb.active{border-color:var(--accent);background:var(--accent2)}
    .thumb-canvas{aspect-ratio:16/9;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px;overflow:hidden}
    .thumb-title{font-size:10px;font-weight:700;color:#17324d;margin-bottom:4px}
    .thumb-text{font-size:7px;color:#475569;line-height:1.4}
    .thumb-num{font-size:11px;color:var(--muted);margin-top:5px}
    .workspace{display:flex;flex-direction:column;min-width:0}
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#fff;border-bottom:1px solid var(--line);gap:10px;flex-wrap:wrap}
    .canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:28px;overflow:auto}
    .slide{width:min(960px,100%);aspect-ratio:16/9;background:var(--slide-bg);border-radius:12px;box-shadow:0 18px 55px rgba(15,23,42,.14);position:relative;overflow:hidden;padding:7% 8%;display:flex;flex-direction:column;justify-content:center}
    .slide::after{content:"";position:absolute;left:0;top:0;width:10px;height:100%;background:var(--accent)}
    .slide-title{font-size:42px;line-height:1.2;font-weight:700;color:var(--slide-title);margin:0 0 24px;white-space:pre-wrap}
    .slide-content{font-size:26px;line-height:1.55;color:var(--slide-text);white-space:pre-wrap}
    .slide-content ul{margin:0;padding-left:1.2em}
    .slide-content table{width:100%;border-collapse:collapse;font-size:.72em;background:#fff}
    .slide-content th,.slide-content td{border:1px solid #cbd5e1;padding:10px;text-align:left}
    .slide-content th{background:var(--accent2);color:var(--slide-title)}
    .slide-image{position:absolute;right:6%;bottom:8%;width:34%;max-height:46%;object-fit:cover;border-radius:16px;border:1px solid rgba(0,0,0,.08)}
    .has-image .slide-content{width:56%}
    .style-card{border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px}
    .style-card strong{display:block;font-size:13px;margin-bottom:4px}
    .style-card small{color:var(--muted)}
    .chip{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:6px 9px;font-size:12px;margin:3px 3px 0 0;background:#fff}
    .notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:10px;padding:10px;font-size:12px;line-height:1.45}
    .status{font-size:12px;color:var(--muted)}
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:20}
    .modal.show{display:flex}
    .modal-card{background:#fff;border-radius:18px;max-width:760px;width:100%;max-height:90vh;overflow:auto;padding:20px}
    .modal-card h2{margin-top:0}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .animate-up{animation:fromBottom .7s ease both}
    .animate-down{animation:fromTop .7s ease both}
    .animate-left{animation:fromLeft .7s ease both}
    .animate-right{animation:fromRight .7s ease both}
    .animate-fade{animation:fadeIn .7s ease both}
    @keyframes fromBottom{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
    @keyframes fromTop{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:none}}
    @keyframes fromLeft{from{opacity:0;transform:translateX(-50px)}to{opacity:1;transform:none}}
    @keyframes fromRight{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:none}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @media(max-width:1100px){.app{grid-template-columns:240px minmax(0,1fr)}.inspector{grid-column:1/-1;border-left:0;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.inspector>.section{margin:0}}
    @media(max-width:760px){.app{display:block}.sidebar{border-right:0;border-bottom:1px solid var(--line)}.slides-list{grid-template-columns:repeat(3,1fr)}.canvas-wrap{padding:12px}.slide-title{font-size:clamp(22px,7vw,42px)}.slide-content{font-size:clamp(15px,4vw,26px)}.inspector{display:block}.grid2{grid-template-columns:1fr}.topbar{position:sticky;top:0;z-index:5}}
  </style>
  <meta name="theme-color" content="#17324d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="AI簡報工作室" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">AI簡報工作室</div>
    <div class="sub">牙醫診所／醫療／簡潔商務模板</div>

    <button class="btn primary full" id="openWizard">＋ AI 建立簡報</button>

    <div class="section">
      <h3>投影片</h3>
      <div class="row">
        <button class="btn" id="addTextSlide">＋文字頁</button>
        <button class="btn" id="addTableSlide">＋表格頁</button>
        <button class="btn" id="deleteSlideBtn">刪除本頁</button>
      </div>
      <div class="slides-list" id="slidesList" style="margin-top:10px"></div>
    </div>

    <div class="section">
      <h3>整體風格（母片）</h3>
      <div id="themeList"></div>
    </div>
  </aside>

  <main class="workspace">
    <div class="topbar">
      <div>
        <strong id="projectName">未命名簡報</strong>
        <div class="status" id="saveStatus">尚未儲存</div>
      </div>
      <div class="row">
        <button class="btn" id="previewBtn">▶ 預覽動畫</button>
        <button class="btn" id="saveBtn">儲存專案</button>
        <button class="btn primary" id="exportBtn">匯出可編輯 PPTX</button>
      </div>
    </div>

    <div class="canvas-wrap">
      <section class="slide" id="slideCanvas">
        <h1 class="slide-title" id="canvasTitle"></h1>
        <div class="slide-content" id="canvasContent"></div>
        <img class="slide-image" id="canvasImage" alt="" hidden />
      </section>
    </div>
  </main>

  <aside class="inspector">
    <div class="section">
      <h3>本頁內容</h3>
      <div class="field">
        <label>標題</label>
        <textarea id="titleInput"></textarea>
      </div>
      <div class="field" id="textField">
        <label>內文（每行一個重點）</label>
        <textarea id="contentInput"></textarea>
      </div>
      <div id="tableEditor" hidden></div>
    </div>

    <div class="section">
      <h3>文字設定</h3>
      <div class="grid2">
        <div class="field">
          <label>標題字型</label>
          <select id="titleFont"></select>
        </div>
        <div class="field">
          <label>標題大小</label>
          <input id="titleSize" type="number" min="18" max="72" />
        </div>
        <div class="field">
          <label>內文字型</label>
          <select id="bodyFont"></select>
        </div>
        <div class="field">
          <label>內文大小</label>
          <input id="bodySize" type="number" min="12" max="48" />
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <label>標題顏色</label>
          <input id="titleColor" type="color" />
        </div>
        <div class="field">
          <label>內文顏色</label>
          <input id="bodyColor" type="color" />
        </div>
      </div>
      <div class="notice">特色字體若在其他電腦未安裝，PowerPoint 會自動替換，文字仍可見，但可能略有跑版。</div>
    </div>

    <div class="section">
      <h3>母片套用範圍</h3>
      <div class="field">
        <select id="themeScope">
          <option value="all">套用全部投影片</option>
          <option value="current">只套用目前頁</option>
        </select>
      </div>
    </div>

    <div class="section">
      <h3>圖片</h3>
      <div class="field">
        <label>上傳圖片</label>
        <input id="imageUpload" type="file" accept="image/*" />
      </div>
      <button class="btn full" id="aiImageBtn">圖片建議</button>
      <button class="btn full" id="removeImageBtn" style="margin-top:8px">移除圖片</button>
    </div>

    <div class="section">
      <h3>動畫</h3>
      <div class="field">
        <label>簡單進場效果</label>
        <select id="animationSelect">
          <option value="fade">淡入</option>
          <option value="up">由下往上</option>
          <option value="down">由上往下</option>
          <option value="left">由左進入</option>
          <option value="right">由右進入</option>
          <option value="none">不使用動畫</option>
        </select>
      </div>
    </div>
  </aside>
</div>

<div class="modal" id="wizardModal">
  <div class="modal-card">
    <h2>AI 建立專業簡報</h2>
    <div class="grid2">
      <div class="field">
        <label>簡報名稱</label>
        <input id="wizName" value="牙醫診所教育訓練" />
      </div>
      <div class="field">
        <label>模板風格</label>
        <select id="wizTheme">
          <option value="medical">醫療專業風</option>
          <option value="minimal">極簡白色風</option>
          <option value="business">現代商務風</option>
          <option value="dental">清新牙科風</option>
          <option value="dark">深色專業風</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>每頁內容（每段以空白行分隔；第一行視為標題）</label>
      <textarea id="wizContent" style="min-height:260px">牙周病衛教
牙周病是常見的口腔疾病
定期檢查與潔牙可降低風險

常見症狀
刷牙出血
牙齦紅腫
口臭
牙齒鬆動

預防方式
正確刷牙
使用牙線
每半年定期檢查</textarea>
    </div>
    <div class="row" style="justify-content:flex-end">
      <button class="btn" id="closeWizard">取消</button>
      <button class="btn primary" id="generateSlides">產生簡報初稿</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script>
const safeFonts = [
  "微軟正黑體","新細明體","細明體","標楷體","思源黑體","思源宋體",
  "Noto Sans TC","Noto Serif TC","Arial","Calibri","Aptos","Segoe UI",
  "Times New Roman","Verdana","Georgia","Tahoma","Century Gothic"
];
const featureFonts = ["jf open 粉圓","芫荽","源泉圓體","GenSenRounded","台北黑體","俐方體","清松手寫體","辰宇落雁體"];
const themes = {
  medical:{name:"醫療專業風",desc:"白底、深藍、專業醫療感",accent:"#2f6f8f",accent2:"#dceef5",bg:"#ffffff",title:"#17324d",text:"#334155"},
  minimal:{name:"極簡白色風",desc:"大量留白、細線條、乾淨俐落",accent:"#475569",accent2:"#eef2f7",bg:"#ffffff",title:"#111827",text:"#374151"},
  business:{name:"現代商務風",desc:"灰白底、深色標題、沉穩",accent:"#44546a",accent2:"#e8edf3",bg:"#f9fafb",title:"#1f2937",text:"#374151"},
  dental:{name:"清新牙科風",desc:"白色、淡藍、薄荷綠，不幼稚",accent:"#3d8b8b",accent2:"#e1f3f1",bg:"#ffffff",title:"#1e4f5f",text:"#36545c"},
  dark:{name:"深色專業風",desc:"深藍灰背景，適合病例與研討",accent:"#4da3c7",accent2:"#284357",bg:"#162533",title:"#ffffff",text:"#e5edf3"}
};

let project = {
  name:"未命名簡報",
  theme:"medical",
  slides:[
    {type:"text",title:"牙醫診所專業簡報",content:"由 AI 產生初稿，再依需求自由調整",titleFont:"微軟正黑體",bodyFont:"微軟正黑體",titleSize:42,bodySize:26,titleColor:"#17324d",bodyColor:"#334155",animation:"fade",image:null,themeOverride:null}
  ]
};
let currentIndex = 0;

const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));

function setTheme(key){
  const scope=$("#themeScope")?.value||"all";
  if(scope==="current"){
    project.slides[currentIndex].themeOverride=key;
  }else{
    project.theme=key;
    project.slides.forEach(s=>s.themeOverride=null);
  }
  applyCurrentTheme();
  render();
  markDirty();
}
function getSlideTheme(s){
  return themes[s.themeOverride||project.theme];
}
function applyCurrentTheme(){
  const s=project.slides[currentIndex];
  const t=getSlideTheme(s);
  const r=document.documentElement.style;
  r.setProperty("--accent",t.accent); r.setProperty("--accent2",t.accent2);
  r.setProperty("--slide-bg",t.bg); r.setProperty("--slide-title",s.titleColor||t.title); r.setProperty("--slide-text",s.bodyColor||t.text);
}
function fillFonts(){
  const opts = [
    '<optgroup label="一般／安全字體">'+safeFonts.map(f=>`<option>${f}</option>`).join("")+'</optgroup>',
    '<optgroup label="特色字體">'+featureFonts.map(f=>`<option>${f}</option>`).join("")+'</optgroup>'
  ].join("");
  $("#titleFont").innerHTML=opts; $("#bodyFont").innerHTML=opts;
}
function renderThemes(){
  $("#themeList").innerHTML=Object.entries(themes).map(([k,t])=>`
    <button class="style-card btn full" data-theme="${k}" style="text-align:left">
      <strong>${t.name}</strong><small>${t.desc}</small>
    </button>`).join("");
  document.querySelectorAll("[data-theme]").forEach(b=>b.addEventListener("click",()=>setTheme(b.dataset.theme)));
}
function renderSlidesList(){
  $("#slidesList").innerHTML=project.slides.map((s,i)=>`
    <button class="thumb ${i===currentIndex?"active":""}" data-i="${i}">
      <div class="thumb-canvas">
        <div class="thumb-title">${esc(s.title)}</div>
        <div class="thumb-text">${esc(s.type==="table"?"表格內容":s.content).replace(/\n/g,"<br>")}</div>
      </div>
      <div class="thumb-num">第 ${i+1} 頁</div>
    </button>`).join("");
  document.querySelectorAll(".thumb").forEach(b=>b.addEventListener("click",()=>{currentIndex=+b.dataset.i;render();}));
}
function renderTableEditor(s){
  const rows=s.table||[["欄位1","欄位2"],["內容","內容"]];
  $("#tableEditor").innerHTML=`
    <div class="field"><label>表格資料（每列一行，以逗號分隔）</label>
    <textarea id="tableData">${rows.map(r=>r.join(",")).join("\n")}</textarea></div>`;
  $("#tableData").addEventListener("input",e=>{
    s.table=e.target.value.split("\n").filter(Boolean).map(r=>r.split(","));
    renderCanvas();
  });
}
function renderCanvas(){
  const s=project.slides[currentIndex];
  $("#canvasTitle").textContent=s.title;
  $("#canvasTitle").style.fontFamily=`"${s.titleFont}"`;
  $("#canvasTitle").style.fontSize=s.titleSize+"px";
  $("#canvasTitle").style.color=s.titleColor||getSlideTheme(s).title;
  $("#canvasContent").style.fontFamily=`"${s.bodyFont}"`;
  $("#canvasContent").style.fontSize=s.bodySize+"px";
  $("#canvasContent").style.color=s.bodyColor||getSlideTheme(s).text;
  if(s.type==="table"){
    const rows=s.table||[];
    $("#canvasContent").innerHTML=`<table>${rows.map((r,ri)=>`<tr>${r.map(c=>ri===0?`<th>${esc(c)}</th>`:`<td>${esc(c)}</td>`).join("")}</tr>`).join("")}</table>`;
  }else{
    const lines=(s.content||"").split("\n").filter(Boolean);
    $("#canvasContent").innerHTML=lines.length>1?`<ul>${lines.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:esc(s.content||"");
  }
  const img=$("#canvasImage");
  if(s.image){img.src=s.image;img.hidden=false;$("#slideCanvas").classList.add("has-image")}
  else{img.hidden=true;$("#slideCanvas").classList.remove("has-image")}
}
function renderInspector(){
  const s=project.slides[currentIndex];
  $("#titleInput").value=s.title;
  $("#contentInput").value=s.content||"";
  $("#titleFont").value=s.titleFont;
  $("#bodyFont").value=s.bodyFont;
  $("#titleSize").value=s.titleSize;
  $("#bodySize").value=s.bodySize;
  $("#titleColor").value=s.titleColor||getSlideTheme(s).title;
  $("#bodyColor").value=s.bodyColor||getSlideTheme(s).text;
  $("#animationSelect").value=s.animation;
  $("#textField").hidden=s.type==="table";
  $("#tableEditor").hidden=s.type!=="table";
  if(s.type==="table")renderTableEditor(s);
}
function render(){
  $("#projectName").textContent=project.name;
  applyCurrentTheme();
  renderSlidesList(); renderCanvas(); renderInspector();
  localStorage.setItem("ai-presentation-studio-project",JSON.stringify(project));
}
function newTextSlide(){
  project.slides.push({type:"text",title:"新增標題",content:"請輸入內容",titleFont:"微軟正黑體",bodyFont:"微軟正黑體",titleSize:40,bodySize:24,titleColor:getSlideTheme(project.slides[currentIndex]).title,bodyColor:getSlideTheme(project.slides[currentIndex]).text,animation:"fade",image:null,themeOverride:null});
  currentIndex=project.slides.length-1;render();
}
function newTableSlide(){
  project.slides.push({type:"table",title:"資料表格",table:[["項目","說明"],["範例","內容"]],titleFont:"微軟正黑體",bodyFont:"微軟正黑體",titleSize:38,bodySize:22,titleColor:getSlideTheme(project.slides[currentIndex]).title,bodyColor:getSlideTheme(project.slides[currentIndex]).text,animation:"fade",image:null,themeOverride:null});
  currentIndex=project.slides.length-1;render();
}
function deleteCurrentSlide(){
  if(project.slides.length<=1){
    alert("至少需保留一張投影片。");
    return;
  }
  project.slides.splice(currentIndex,1);
  currentIndex=Math.max(0,Math.min(currentIndex,project.slides.length-1));
  render();
  markDirty();
}
function generateFromWizard(){
  const blocks=$("#wizContent").value.trim().split(/\n\s*\n/).filter(Boolean);
  project.name=$("#wizName").value||"未命名簡報";
  project.theme=$("#wizTheme").value;
  project.slides=blocks.map((b,i)=>{
    const lines=b.split("\n");
    return {type:"text",title:lines.shift()||`第${i+1}頁`,content:lines.join("\n"),titleFont:"微軟正黑體",bodyFont:"微軟正黑體",titleSize:i===0?46:40,bodySize:24,titleColor:themes[project.theme].title,bodyColor:themes[project.theme].text,animation:i===0?"fade":"up",image:null,themeOverride:null};
  });
  if(!project.slides.length)newTextSlide();
  currentIndex=0;$("#themeScope").value="all";applyCurrentTheme();$("#wizardModal").classList.remove("show");markDirty();render();
}
function markDirty(){ $("#saveStatus").textContent="尚未儲存變更"; }
function saveProject(){
  const blob=new Blob([JSON.stringify(project,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=(project.name||"簡報專案")+".json";a.click();URL.revokeObjectURL(a.href);
  $("#saveStatus").textContent="專案檔已下載";
}
function preview(){
  const s=project.slides[currentIndex], cls={"fade":"animate-fade","up":"animate-up","down":"animate-down","left":"animate-left","right":"animate-right"}[s.animation];
  const canvas=$("#slideCanvas");
  canvas.classList.remove("animate-fade","animate-up","animate-down","animate-left","animate-right");
  void canvas.offsetWidth;
  if(cls)canvas.classList.add(cls);
}
async function exportPptx(){
  if(typeof PptxGenJS==="undefined"){alert("PPTX 元件尚未載入，請確認網路連線後再試。");return}
  const pptx=new PptxGenJS();
  pptx.layout="LAYOUT_WIDE";
  pptx.author="AI簡報工作室";
  pptx.subject=project.name;
  pptx.title=project.name;
  pptx.company="AI簡報工作室";
  project.slides.forEach((s,idx)=>{
    const t=getSlideTheme(s);
    const slide=pptx.addSlide();
    slide.background={color:t.bg.replace("#","")};
    slide.addShape(pptx.ShapeType.rect,{x:0,y:0,w:0.12,h:7.5,fill:{color:t.accent.replace("#","")},line:{color:t.accent.replace("#","")}});
    slide.addText(s.title,{x:.75,y:.72,w:11.5,h:.75,fontFace:s.titleFont,fontSize:s.titleSize*0.72,bold:true,color:(s.titleColor||t.title).replace("#",""),margin:0,breakLine:false,fit:"shrink"});
    if(s.type==="table"){
      const rows=s.table||[];
      slide.addTable(rows,{x:.8,y:1.75,w:11.5,h:4.6,fontFace:s.bodyFont,fontSize:s.bodySize*0.62,color:(s.bodyColor||t.text).replace("#",""),border:{type:"solid",color:"CBD5E1",pt:1},fill:"FFFFFF",rowH:.45,margin:.08,
        bold:true,autoFit:false});
    } else {
      const lines=(s.content||"").split("\n").filter(Boolean);
      if(lines.length>1){
        slide.addText(lines.map(x=>({text:x,options:{bullet:{indent:18},hanging:4,breakLine:true}})),{x:.9,y:1.75,w:s.image?6.6:11,h:4.6,fontFace:s.bodyFont,fontSize:s.bodySize*0.72,color:(s.bodyColor||t.text).replace("#",""),margin:0.03,breakLine:true,fit:"shrink"});
      }else{
        slide.addText(s.content||"",{x:.9,y:1.75,w:s.image?6.6:11,h:4.6,fontFace:s.bodyFont,fontSize:s.bodySize*0.72,color:(s.bodyColor||t.text).replace("#",""),margin:0.03,fit:"shrink",valign:"top"});
      }
    }
    if(s.image){
      slide.addImage({data:s.image,x:8.2,y:2.1,w:4.1,h:3.5,rounding:true});
    }
    slide.addText(String(idx+1),{x:11.9,y:7.0,w:.5,h:.2,fontFace:"Arial",fontSize:9,color:"94A3B8",align:"right",margin:0});
  });
  await pptx.writeFile({fileName:(project.name||"專業簡報")+".pptx"});
}
function aiImageSuggestion(){
  const s=project.slides[currentIndex];
  alert(`圖片建議：可為「${s.title}」加入乾淨、專業、無卡通感的牙科或醫療情境圖片。你可以使用上方「上傳圖片」直接插入。`);
}

$("#addTextSlide").addEventListener("click",()=>{newTextSlide();markDirty()});
$("#addTableSlide").addEventListener("click",()=>{newTableSlide();markDirty()});
$("#deleteSlideBtn").addEventListener("click",deleteCurrentSlide);
$("#titleInput").addEventListener("input",e=>{project.slides[currentIndex].title=e.target.value;renderCanvas();renderSlidesList();markDirty()});
$("#contentInput").addEventListener("input",e=>{project.slides[currentIndex].content=e.target.value;renderCanvas();renderSlidesList();markDirty()});
$("#titleFont").addEventListener("change",e=>{project.slides[currentIndex].titleFont=e.target.value;renderCanvas();markDirty()});
$("#bodyFont").addEventListener("change",e=>{project.slides[currentIndex].bodyFont=e.target.value;renderCanvas();markDirty()});
$("#titleSize").addEventListener("input",e=>{project.slides[currentIndex].titleSize=+e.target.value;renderCanvas();markDirty()});
$("#bodySize").addEventListener("input",e=>{project.slides[currentIndex].bodySize=+e.target.value;renderCanvas();markDirty()});

$("#imageUpload").addEventListener("change",e=>{
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();r.onload=()=>{project.slides[currentIndex].image=r.result;renderCanvas();markDirty()};r.readAsDataURL(file);
});
$("#removeImageBtn").addEventListener("click",()=>{project.slides[currentIndex].image=null;renderCanvas();markDirty()});

$("#previewBtn").addEventListener("click",preview);

try{
  const saved=localStorage.getItem("ai-presentation-studio-project");
  if(saved){
    const parsed=JSON.parse(saved);
    if(parsed&&Array.isArray(parsed.slides)&&parsed.slides.length) project=parsed;
  }
}catch(e){}
fillFonts();renderThemes();applyCurrentTheme();render();
